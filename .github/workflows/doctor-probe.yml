# Upstream TCP probe with local dockerized mock upstreams.

name: doctor-upstream-probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Start mock upstreams (docker compose)
        run: docker compose -f .github/compose/doctor-probe.compose.yml up -d

      - name: Wait for mock ports
        shell: bash
        run: |
          for p in 9000 9001; do
            for i in {1..20}; do
              if (echo > /dev/tcp/127.0.0.1/$p) >/dev/null 2>&1; then
                break
              fi
              sleep 1
              if [ "$i" -eq 20 ]; then
                echo "port $p did not become reachable"
                exit 1
              fi
            done
          done

      - name: Doctor with upstream probe (mock profile)
        run: cargo run -- doctor --config config/mock-config.yaml --probe-upstream --json

      - name: Stop mock upstreams
        if: always()
        run: docker compose -f .github/compose/doctor-probe.compose.yml down -v
